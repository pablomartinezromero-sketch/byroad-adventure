    <circle cx="24" cy="24" r="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <!-- Road body -->
    <path d="M10 14 C18 14 22 18 22 22 C22 26 18 30 10 30" stroke="#e7e5e4" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M38 18 C30 18 26 22 26 26 C26 30 30 34 38 34" stroke="#e7e5e4" stroke-width="5" stroke-linecap="round" fill="none"/>
