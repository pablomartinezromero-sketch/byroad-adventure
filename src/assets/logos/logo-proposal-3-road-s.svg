  </g>
  <!-- Wordmark -->
  <text x="56" y="21" fill="#ffffff" font-family="Outfit, Arial, sans-serif" font-weight="900" font-size="17" font-style="italic" letter-spacing="-0.3">BYROAD</text>
  <text x="56" y="38" fill="#f97316" font-family="Outfit, Arial, sans-serif" font-weight="900" font-size="17" font-style="italic" letter-spacing="-0.3">ADVENTURES</text>
